<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ⚠️ AO CLONAR: edite o título/meta abaixo + src/config/store.ts + vite.config.ts -->
    <!-- Em runtime esses valores são sobrescritos pelo SEO.tsx via React Helmet -->
    <title>JR Acessórios — Produtos e Acessórios | Entrega Rápida</title>
    <meta name="description" content="JR Acessórios — sua loja de acessórios e produtos variados. Ótimos preços, pagamento com PIX e cartão, entrega no mesmo dia em Osasco/SP e para todo o Brasil." />
    <meta name="author" content="JR Acessórios" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="JR Acessórios — Acessórios Premium e Exclusivos" />
    <meta property="og:description" content="JR Acessórios — sua boutique online de acessórios premium. Cintos, bolsas e muito mais com qualidade e elegância." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:image" content="https://jracessorios.com/hero-bg.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="JR Acessórios — Acessórios Premium e Exclusivos" />
    <meta name="twitter:description" content="JR Acessórios — sua boutique online de acessórios premium." />
    <meta name="twitter:image" content="https://jracessorios.com/hero-bg.png" />

    <!-- Preload hero image -->
    <link rel="preload" as="image" href="/hero-bg.png" fetchpriority="high" />

    <!-- Abre a conexão com o Supabase antes da primeira query (economiza ~100-300ms) -->
    <link rel="preconnect" href="https://kpjmjwxcpzcipcxunthq.supabase.co" crossorigin="anonymous" />
    <link rel="dns-prefetch" href="https://kpjmjwxcpzcipcxunthq.supabase.co" />

    <!-- Typography — loaded in <head> for zero-FOUT.
         Só os pesos realmente usados (itálico apenas 300/400 do logo) — menos bytes de fonte. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
